<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>分割命題の導出関係</title>
<style>
  body { font-family: sans-serif; background: #1a1a2e; color: #e0e0e0; margin: 40px; }
  h1 { color: #fff; font-size: 20px; }
  .legend { margin: 20px 0; font-size: 13px; line-height: 2; }
  .legend span { display: inline-block; margin-right: 20px; }
  svg text { font-family: sans-serif; }
</style>
</head>
<body>
<h1>分割命題の導出関係（単独 + 組み合わせ）</h1>
<div class="legend">
  <span>🟦 独立軸（他から導出されない）</span>
  <span>🟩 単独導出で得られる命題</span>
  <span>🟪 組み合わせ導出で得られる命題</span><br>
  <span>━ 単独導出（A → B）</span>
  <span>┅ 組み合わせ導出（A + B → C）</span>
</div>

<svg width="820" height="500" viewBox="0 0 820 500">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ce93d8"/>
    </marker>
  </defs>

  <!-- === 独立軸 === -->
  <!-- P6 -->
  <rect x="140" y="400" width="220" height="44" rx="8" fill="#42a5f5" opacity="0.9"/>
  <text x="250" y="427" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">P6: 飢餓救済目的</text>

  <!-- P7 -->
  <rect x="460" y="400" width="220" height="44" rx="8" fill="#42a5f5" opacity="0.9"/>
  <text x="570" y="427" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">P7: 道徳的禁忌食材</text>

  <text x="410" y="470" text-anchor="middle" fill="#42a5f5" font-size="12">独立な2軸</text>

  <!-- === 単独導出チェーン（P6 から） === -->
  <!-- P6 → P5 -->
  <line x1="210" y1="400" x2="210" y2="312" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arr)"/>
  <!-- P5 -->
  <rect x="140" y="270" width="180" height="40" rx="8" fill="#4caf50" opacity="0.85"/>
  <text x="230" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">P5: 生存の危機</text>

  <!-- P5 → P4 -->
  <line x1="180" y1="270" x2="140" y2="192" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arr)"/>
  <!-- P4 -->
  <rect x="60" y="150" width="170" height="40" rx="8" fill="#4caf50" opacity="0.85"/>
  <text x="145" y="175" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">P4: 深刻な状況</text>

  <!-- P6 → P3 -->
  <line x1="290" y1="400" x2="350" y2="312" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arr)"/>
  <!-- P3 -->
  <rect x="280" y="270" width="180" height="40" rx="8" fill="#4caf50" opacity="0.85"/>
  <text x="370" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">P3: 偽られた側</text>

  <!-- P3 → P1' -->
  <line x1="400" y1="270" x2="440" y2="192" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arr)"/>
  <!-- P1' -->
  <rect x="370" y="150" width="170" height="40" rx="8" fill="#4caf50" opacity="0.85"/>
  <text x="455" y="175" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">P1': 欺瞞があった</text>

  <!-- 単独導出ラベル -->
  <text x="195" y="360" fill="#ff6b6b" font-size="11">単独導出</text>
  <text x="310" y="360" fill="#ff6b6b" font-size="11">単独導出</text>
  <text x="100" y="235" fill="#ff6b6b" font-size="11">単独導出</text>
  <text x="430" y="235" fill="#ff6b6b" font-size="11">単独導出</text>

  <!-- === 組み合わせ導出 === -->
  <!-- P6 + P7 → P2 -->
  <!-- junction point -->
  <circle cx="410" cy="380" r="4" fill="#ce93d8"/>
  <!-- P6 to junction -->
  <line x1="360" y1="410" x2="406" y2="383" stroke="#ce93d8" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- P7 to junction -->
  <line x1="460" y1="410" x2="414" y2="383" stroke="#ce93d8" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- junction to P2 -->
  <line x1="410" y1="376" x2="660" y2="192" stroke="#ce93d8" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-purple)"/>

  <!-- P2 -->
  <rect x="590" y="150" width="190" height="40" rx="8" fill="#9c27b0" opacity="0.75"/>
  <text x="685" y="175" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">P2: 悟り→自殺の因果</text>

  <text x="560" y="280" fill="#ce93d8" font-size="11">P6 + P7 から導出</text>

  <!-- === 注釈 === -->
  <!-- 独立軸の枠 -->
  <rect x="130" y="390" width="560" height="65" rx="12" fill="none" stroke="#42a5f5" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- 導出結果の枠 -->
  <rect x="50" y="135" width="740" height="70" rx="12" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  <text x="410" y="125" text-anchor="middle" fill="#888" font-size="11">導出される命題（分割命題 or 中間命題として扱う）</text>

</svg>
</body>
</html>
